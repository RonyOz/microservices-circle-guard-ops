# cliff.toml — git-cliff configuration
# Generates CHANGELOG from conventional commits.
# Format: feat(scope): message → Features section
#         fix(scope):  message → Bug Fixes section
#         chore/docs/refactor → Other Changes

[changelog]
header = """
# Changelog — CircleGuard
All notable changes to this project will be documented here.
Format follows [Conventional Commits](https://www.conventionalcommits.org/).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))\
  {% if commit.breaking %} ⚠️ BREAKING{% endif %}
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat",     group = "Features"      },
  { message = "^fix",      group = "Bug Fixes"     },
  { message = "^perf",     group = "Performance"   },
  { message = "^refactor", group = "Refactoring"   },
  { message = "^test",     group = "Tests"         },
  { message = "^chore",    group = "Maintenance"   },
  { message = "^docs",     group = "Documentation" },
  { message = "^ci",       skip = true             },
  { body     = ".*security", group = "Security"    },
]

filter_commits = false
tag_pattern    = "v[0-9].*"
skip_tags      = "v0.1.0-beta.1"
topo_order     = false
sort_commits   = "oldest"
