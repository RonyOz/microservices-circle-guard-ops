replicaCount: 1

image:
  repository: ghcr.io/circleguard/promotion-service
  pullPolicy: IfNotPresent
  tag: ""  # Overridden by pipeline: --set image.tag=sha-<commit>

service:
  type: ClusterIP
  port: 8086

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8086
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8086
  initialDelaySeconds: 20
  periodSeconds: 5

env: {}
  # Example — overridden per environment via --set or values file:
  # SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/circleguard

secrets: {}
  # Mounted from K8s secrets — never stored in this file
