apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  labels:
    app: neo4j
    circleguard/component: backing-service
spec:
  enableServiceLinks: false
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
        circleguard/component: backing-service
    spec:
      containers:
        - name: neo4j
          image: "{{ .Values.neo4j.image }}:{{ .Values.neo4j.tag }}"
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: NEO4J_AUTH
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_connector_bolt_listen__address
              value: ":7687"
            - name: NEO4J_dbms_connector_bolt_advertised__address
              value: ":7687"
            - name: NEO4J_server_memory_heap_initial__size
              value: "{{ .Values.neo4j.heapSize }}"
            - name: NEO4J_server_memory_heap_max__size
              value: "{{ .Values.neo4j.heapSize }}"
            - name: NEO4J_server_memory_pagecache_size
              value: "{{ .Values.neo4j.pageCacheSize }}"
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 1500Mi
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.neo4j.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  labels:
    app: neo4j
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
