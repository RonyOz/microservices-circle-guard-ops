replicaCount: 1

image:
  repository: registry.digitalocean.com/circleguard/circleguard-services
  pullPolicy: IfNotPresent
  tag: ""  # Overridden by pipeline: --set image.tag=<service>-sha-<commit>

service:
  type: ClusterIP
  port: 8086

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8086
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8086
  initialDelaySeconds: 0
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8086
  initialDelaySeconds: 20
  periodSeconds: 5

env:
  DB_HOST: "postgres"
  DB_NAME: "circleguard_promotion"
  REDIS_HOST: "redis-master"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  NEO4J_URI: "bolt://neo4j:7687"

envFrom:
  - secretRef:
      name: promotion-service-secret
      # Keys expected: DB_USERNAME, DB_PASSWORD
