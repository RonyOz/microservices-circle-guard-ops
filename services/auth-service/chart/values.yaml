replicaCount: 1

image:
  repository: ghcr.io/circleguard/auth-service
  pullPolicy: IfNotPresent
  tag: ""  # Overridden by pipeline: --set image.tag=sha-<commit>

service:
  type: ClusterIP
  port: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 0
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 20
  periodSeconds: 5

env:
  DB_HOST: "postgres"
  DB_NAME: "circleguard_auth"
  LDAP_HOST: "openldap"

envFrom:
  - secretRef:
      name: auth-service-secret
      # Keys expected: DB_USERNAME, DB_PASSWORD, JWT_SECRET
