# Bitnami Kafka values — rendered per-environment by Terraform
replicaCount: 1  # Increase to 3 in production if needed

kraft:
  enabled: true  # KRaft mode (no Zookeeper)

listeners:
  client:
    protocol: PLAINTEXT

persistence:
  enabled: true
  size: "2Gi"

provisioning:
  enabled: true
  topics:
    - name: contact-events
      partitions: 3
      replicationFactor: 1
    - name: notification-events
      partitions: 3
      replicationFactor: 1
    - name: status-promotions
      partitions: 3
      replicationFactor: 1
